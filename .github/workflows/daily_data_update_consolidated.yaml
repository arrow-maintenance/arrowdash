name: Daily Data Update (Consolidated)

on:
  schedule:
    - cron: '15 0 * * *'  # Every day at 00:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Python dependencies
        run: |
          pip install pandas requests chatlas google-genai

      - name: Install R dependencies
        run: |
          install.packages(c("gh", "dplyr", "purrr", "arrow"), repos = "https://p3m.dev/cran/__linux__/noble/latest")
        shell: Rscript {0}

      - name: Update open counts
        run: python scripts/update_open_counts.py
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}

      - name: Update monthly commits
        run: python scripts/update_monthly_commits.py
        env:
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}

      - name: Update mailing list summary
        run: python scripts/update_ml_summary.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Update parquet cache
        run: Rscript scripts/gh_cache/fetch_latest_activity.R
        env:
          GITHUB_PAT: ${{ secrets.GH_API_TOKEN }}

      - name: Commit and push if data changed
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/
          git diff --cached --quiet || (git commit -m "Update all data metrics [auto]" && git push)
