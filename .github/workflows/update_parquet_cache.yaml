name: Update Parquet Cache

on:
  schedule:
    - cron: '30 0 * * *'  # Every day at 00:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-parquet-cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          install.packages(c("gh", "dplyr", "purrr", "arrow"), repos = "https://p3m.dev/cran/__linux__/noble/latest")
        shell: Rscript {0}

      - name: Fetch latest activity
        run: Rscript scripts/gh_cache/fetch_latest_activity.R
        env:
          GITHUB_PAT: ${{ secrets.GH_API_TOKEN }}

      - name: Commit and push updated cache
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/cache/*.parquet
          git diff --cached --quiet || (git commit -m "Update parquet cache [auto]" && git push)
